<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Treasured Pieces • Version 6.0.1</title>
		<link rel="stylesheet" href="features/studio-ui/studio-ui.css" />
	</head>
	<body data-version="v6.0.1">
		<a class="skip-link" href="#studioMain">Skip to drawing studio</a>
		<main id="studioMain" class="app">
			<header>
				<h1>Treasured Pieces</h1>
				<div class="tagline">
					Beautiful treasures deserve to become beautiful works.
				</div>
			</header>

			<section class="controls-panel" aria-label="Drawing controls">
				<div class="controls-sequence" aria-hidden="true">
					Canvas | Symmetry | Template | Actions
				</div>
				<div class="controls-row controls-row-primary">
					<label class="control-inline"
						><input id="gridToggle" type="checkbox" checked /> Grid
						Overlay</label
					>
					<span class="controls-divider" aria-hidden="true">|</span>
					<label class="control-field"
						><span>Symmetry Mode</span>
						<select id="mirror">
							<option value="None">Off</option>
							<option value="Horizontal">Mirror Horizontal</option>
							<option value="Vertical">Mirror Vertical</option>
							<option value="180°">Rotate 180°</option>
							<option value="Quad">Mirror Both Axes (Quad)</option>
							<option value="4-Way Radial">Radial 4-Way</option>
							<option value="8-Way Radial">Radial 8-Way</option>
							<option value="Diagonal ↘">Mirror Diagonal ↘</option>
							<option value="Diagonal ↗">Mirror Diagonal ↗</option>
						</select></label
					>
					<span class="controls-divider" aria-hidden="true">|</span>
					<label class="control-field"
						><span>Template Library</span>
						<select id="templateSelect"></select
					></label>
				</div>

				<div class="controls-row controls-row-secondary">
					<span
						id="templateHint"
						class="template-hint"
						aria-live="polite"
					></span>
					<span
						class="controls-divider controls-divider-secondary"
						aria-hidden="true"
						>|</span
					>
					<div class="control-actions">
						<button id="applyTemplateBtn" type="button">Apply Template</button>
						<button id="clearBtn" type="button">Clear Canvas</button>
					</div>
				</div>
			</section>

			<section class="palette-panel" aria-label="Color palette">
				<div
					id="palette"
					role="radiogroup"
					aria-label="Choose paint color"
				></div>
			</section>

			<section class="canvas-panel" aria-label="Pattern canvas">
				<div class="canvas-wrap">
					<canvas
						id="canvas"
						width="570"
						height="450"
						aria-label="Drawing canvas"
					></canvas>
				</div>
			</section>

			<script src="features/project-core/project-core.js"></script>
			<script src="features/studio-ui/studio-ui.js"></script>
		</main>
		<span id="appVersion" class="app-version">v0.0.0</span>
	</body>
</html>
