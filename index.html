<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Treasured Pieces • Version 5.1.0 Alpha 2c</title>
		<link rel="stylesheet" href="css/app.css" />
	</head>
	<body>
		<div class="app" data-version="v0.0.0">
			<header>
				<h1>Treasured Pieces</h1>
				<div class="tagline">
					Beautiful treasures deserve to become beautiful works.
				</div>
				<div class="divider">──────────── ✦ ────────────</div>
			</header>

			<div class="toolbar">
				<label><input id="gridToggle" type="checkbox" checked /> Grid</label>
				<label
					>Symmetry:
					<select id="mirror">
						<option>None</option>
						<option>Horizontal</option>
						<option>Vertical</option>
						<option>Quad</option>
						<option>4-Way Radial</option>
						<option>Diagonal ↘</option>
						<option>Diagonal ↗</option>
					</select>
				</label>
				<button id="clearBtn" type="button">🗑 Clear</button>
			</div>

			<div id="palette"></div>
			<canvas id="canvas" width="570" height="450"></canvas>

			<div class="app-footer">
				<span id="appVersion" class="app-version">v0.0.0</span>
			</div>

			<script src="js/project.js"></script>
			<script src="js/ui.js"></script>
			<script src="js/canvas.js"></script>
			<script src="js/app.js"></script>
		</div>
	</body>
</html>
