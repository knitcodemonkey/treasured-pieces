<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Treasured Pieces • Version 5.4.3</title>
		<link rel="stylesheet" href="css/app.css" />
	</head>
	<body data-version="v5.4.3">
		<div class="app">
			<header>
				<h1>Treasured Pieces</h1>
				<div class="tagline">
					Beautiful treasures deserve to become beautiful works.
				</div>
			</header>

			<div class="toolbar">
				<label><input id="gridToggle" type="checkbox" checked /> Grid</label>
				<label
					>Symmetry:
					<select id="mirror">
						<option>None</option>
						<option>Horizontal</option>
						<option>Vertical</option>
						<option>180°</option>
						<option>Quad</option>
						<option>4-Way Radial</option>
						<option>8-Way Radial</option>
						<option>Diagonal ↘</option>
						<option>Diagonal ↗</option>
					</select>
				</label>
				<label
					>Template:
					<select id="templateSelect"></select>
				</label>
				<span id="templateHint" class="template-hint" aria-live="polite"></span>
				<button id="applyTemplateBtn" type="button">Apply Template</button>
				<button id="clearBtn" type="button">🗑 Clear</button>
			</div>

			<div id="palette"></div>
			<canvas id="canvas" width="570" height="450"></canvas>

			<script src="js/project.js"></script>
			<script src="js/ui.js"></script>
			<script src="js/canvas.js"></script>
			<script src="js/app.js"></script>
		</div>
		<span id="appVersion" class="app-version">v0.0.0</span>
	</body>
</html>
