<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Treasured Pieces • Version 6.1.1</title>
		<link rel="stylesheet" href="features/studio-ui/studio-ui.css" />
	</head>
	<body data-version="v6.1.1">
		<a class="skip-link" href="#studioMain">Skip to drawing studio</a>
		<main id="studioMain" class="app">
			<header>
				<h1>Treasured Pieces</h1>
				<div class="tagline">
					Beautiful treasures deserve to become beautiful works.
				</div>
			</header>

			<section class="controls-panel" aria-label="Drawing controls">
				<div class="controls-topbar">
					<label class="control-inline control-inline-top"
						><input id="gridToggle" type="checkbox" checked /> Grid
						Overlay</label
					>
					<div
						class="feature-tabs"
						role="tablist"
						aria-label="Toolbar features"
					>
						<button
							type="button"
							class="feature-tab is-active"
							id="tabSymmetry"
							role="tab"
							aria-selected="true"
							aria-controls="panelSymmetry"
							data-panel="symmetry"
						>
							Symmetry
						</button>
						<button
							type="button"
							class="feature-tab"
							id="tabTemplate"
							role="tab"
							aria-selected="false"
							aria-controls="panelTemplate"
							data-panel="template"
						>
							Motifs
						</button>
					</div>
					<button id="clearBtn" type="button" class="clear-btn-sticky">
						Clear Canvas
					</button>
				</div>

				<div class="feature-panels">
					<div
						id="panelSymmetry"
						class="feature-panel is-active"
						role="tabpanel"
						aria-labelledby="tabSymmetry"
						data-panel="symmetry"
					>
						<label class="control-field"
							><span>Symmetry Mode</span>
							<select id="mirror">
								<option value="None">Off</option>
								<option value="Horizontal">Mirror Horizontal</option>
								<option value="Vertical">Mirror Vertical</option>
								<option value="180°">Rotate 180°</option>
								<option value="Quad">Mirror Both Axes (Quad)</option>
								<option value="4-Way Radial">Radial 4-Way</option>
								<option value="8-Way Radial">Radial 8-Way</option>
								<option value="Diagonal ↘">Mirror Diagonal ↘</option>
								<option value="Diagonal ↗">Mirror Diagonal ↗</option>
							</select></label
						>
					</div>

					<div
						id="panelTemplate"
						class="feature-panel"
						role="tabpanel"
						aria-labelledby="tabTemplate"
						data-panel="template"
						hidden
					>
						<div
							id="motifPicker"
							class="motif-picker"
							role="group"
							aria-label="Choose a motif"
						></div>
					</div>
				</div>
			</section>

			<section class="palette-panel" aria-label="Color palette">
				<div
					id="palette"
					role="radiogroup"
					aria-label="Choose paint color"
				></div>
			</section>

			<section class="canvas-panel" aria-label="Pattern canvas">
				<div class="canvas-wrap">
					<canvas
						id="canvas"
						width="570"
						height="450"
						aria-label="Drawing canvas"
					></canvas>
				</div>
			</section>

			<script src="features/project-core/project-core.js"></script>
			<script src="features/studio-ui/studio-ui.js"></script>
		</main>
		<span id="appVersion" class="app-version">v0.0.0</span>
	</body>
</html>
