<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Treasured Pieces • Version 7.2.8</title>
		<link rel="stylesheet" href="features/studio-ui/studio-ui.css" />
	</head>
	<body data-version="v7.2.8">
		<a class="skip-link" href="#studioMain">Skip to drawing studio</a>
		<main id="studioMain" class="app">
			<header>
				<h1>Treasured Pieces</h1>
				<div class="tagline">
					Beautiful treasures deserve to become beautiful works.
				</div>
			</header>

			<section class="controls-panel" aria-label="Drawing controls">
				<div class="controls-topbar">
					<div class="controls-feature-group" aria-label="Feature controls">
						<label class="control-field control-field-inline map-art-toggle"
							><input id="mapArtViewToggle" type="checkbox" />
							<span>Map Art View</span></label
						>
						<div
							id="zoomControls"
							class="zoom-controls"
							hidden
							role="group"
							aria-label="Canvas zoom"
						>
							<span class="zoom-label">Zoom</span>
							<button id="zoomOutBtn" type="button" aria-label="Zoom out">
								-
							</button>
							<input
								id="zoomRange"
								type="range"
								min="50"
								max="400"
								step="25"
								value="100"
								aria-label="Canvas zoom percent"
							/>
							<button id="zoomInBtn" type="button" aria-label="Zoom in">
								+
							</button>
							<span id="zoomValue" class="zoom-value">100%</span>
							<button id="zoomResetBtn" type="button">Reset</button>
						</div>
						<div
							id="sizeControls"
							class="size-controls"
							role="group"
							aria-label="Canvas size"
						>
							<label
								class="control-field control-field-inline control-size-field"
								><span>W</span>
								<input
									id="canvasCols"
									type="number"
									min="5"
									max="128"
									step="1"
									value="19"
									inputmode="numeric"
									aria-label="Canvas width in cells"
							/></label>
							<label
								class="control-field control-field-inline control-size-field"
								><span>H</span>
								<input
									id="canvasRows"
									type="number"
									min="5"
									max="128"
									step="1"
									value="15"
									inputmode="numeric"
									aria-label="Canvas height in cells"
							/></label>
							<button id="resizeCanvasBtn" type="button">Resize</button>
						</div>
						<button id="openMotifsBtn" type="button" class="feature-tab">
							Motifs
						</button>
						<label class="control-field control-field-inline"
							><span>Symmetry</span>
							<select id="mirror">
								<option value="None">Off</option>
								<option value="Horizontal">Mirror Horizontal</option>
								<option value="Vertical">Mirror Vertical</option>
								<option value="180°">Rotate 180°</option>
								<option value="Quad">Mirror Both Axes (Quad)</option>
								<option value="4-Way Radial">Radial 4-Way</option>
								<option value="8-Way Radial">Radial 8-Way</option>
								<option value="Diagonal ↘">Mirror Diagonal ↘</option>
								<option value="Diagonal ↗">Mirror Diagonal ↗</option>
							</select></label
						>
					</div>
					<div class="controls-danger-group" aria-label="Destructive actions">
						<button id="clearBtn" type="button" class="clear-btn-sticky">
							Clear Canvas
						</button>
					</div>
				</div>
			</section>

			<div id="motifModal" class="motif-modal" hidden>
				<div id="motifModalBackdrop" class="motif-modal-backdrop"></div>
				<section
					class="motif-modal-dialog"
					role="dialog"
					aria-modal="true"
					aria-labelledby="motifModalTitle"
				>
					<header class="motif-modal-header">
						<h2 id="motifModalTitle">Motifs</h2>
						<button id="closeMotifsBtn" type="button">Close</button>
					</header>
					<div class="motif-modal-body">
						<div
							id="motifPicker"
							class="motif-picker motif-picker-modal"
							role="group"
							aria-label="Choose a motif"
						></div>
					</div>
				</section>
			</div>

			<details class="palette-panel palette-accordion" open>
				<summary class="palette-header">
					<div class="palette-header-main">
						<div
							id="palette"
							role="radiogroup"
							aria-label="Choose paint color"
						></div>
					</div>
					<div class="palette-header-meta">
						<span class="counts-title">Build Counts</span>
						<div id="countsSummary" class="counts-summary">0 colored cells</div>
					</div>
				</summary>
				<div class="counts-content">
					<div id="colorCounts" class="color-counts" aria-live="polite"></div>
				</div>
			</details>

			<section class="canvas-panel" aria-label="Pattern canvas">
				<div class="canvas-wrap">
					<canvas
						id="canvas"
						width="570"
						height="450"
						aria-label="Drawing canvas"
					></canvas>
				</div>
			</section>

			<script src="features/project-core/motifs/single-motifs.js"></script>
			<script src="features/project-core/motifs/border-motifs.js"></script>
			<script src="features/project-core/motifs/map-art-single-motifs.js"></script>
			<script src="features/project-core/motifs/map-art-border-motifs.js"></script>
			<script src="features/project-core/motifs/index.js"></script>
			<script src="features/project-core/project-core.js"></script>
			<script src="features/counts-core/count-rules.js"></script>
			<script src="features/counts-ui/color-usage-ui.js"></script>
			<script src="features/studio-ui/studio-ui.js"></script>
		</main>
		<span id="appVersion" class="app-version">v0.0.0</span>
	</body>
</html>
