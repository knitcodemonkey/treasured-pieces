name: Studio E2E User Flows

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: node

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run studio user-flow E2E tests
        shell: bash
        run: npm run test:e2e
