name: Accessibility Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wcag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: node

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run WCAG 2.2 AA required scan
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/tp-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          node scripts/a11y-check.cjs http://127.0.0.1:4173/index.html wcag22aa

      - name: Run WCAG 2.2 AAA advisory scan
        continue-on-error: true
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/tp-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          node scripts/a11y-check.cjs http://127.0.0.1:4173/index.html wcag22aaa
