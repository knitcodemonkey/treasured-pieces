name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (for example v5.1.0-alpha2d)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Tag must follow the project's version pattern such as v5.1.0-alpha2d"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Find release notes file
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES_PATH="docs/releases/${TAG}.md"

          if [ -f "$NOTES_PATH" ]; then
            echo "has_file=true" >> "$GITHUB_OUTPUT"
            echo "path=$NOTES_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "Missing required release notes file: $NOTES_PATH"
            exit 1
          fi

      - name: Validate accessibility compliance section
        shell: bash
        run: |
          NOTES_PATH="${{ steps.notes.outputs.path }}"
          if grep -Eq '^## Accessibility Compliance$' "$NOTES_PATH"; then
            echo "Accessibility compliance section found."
          else
            echo "Release notes must include a '## Accessibility Compliance' section: $NOTES_PATH"
            exit 1
          fi

      - name: Create GitHub Release from notes file
        if: steps.notes.outputs.has_file == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
          append_body: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
